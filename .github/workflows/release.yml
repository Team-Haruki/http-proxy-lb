name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: http-proxy-lb

jobs:
  release-binaries:
    name: Release Binary (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          pkg_dir="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "${pkg_dir}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${pkg_dir}/"
          cp README.md LICENSE "${pkg_dir}/"
          tar -czf "${pkg_dir}.tar.gz" "${pkg_dir}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkgDir = "${env:BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $pkgDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BINARY_NAME}.exe" "$pkgDir/"
          Copy-Item "README.md","LICENSE" "$pkgDir/"
          Compress-Archive -Path "$pkgDir/*" -DestinationPath "$pkgDir.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            http-proxy-lb-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            http-proxy-lb-${{ github.ref_name }}-${{ matrix.target }}.zip
          if-no-files-found: ignore

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: release-binaries

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true

  docker-release:
    name: Docker Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
